services:
  logiedge-db:
    image: postgres:alpine
    restart: always
    volumes:
      - logiedge-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=logiedge
    ports:
      - "5432:5432"
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: always
    ports:
      - "3000:3000"
volumes:
  logiedge-data: